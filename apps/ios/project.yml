name: LittleBaby
options:
  bundleIdPrefix: ai.littlebaby
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  LittleBabyKit:
    path: ../shared/LittleBabyKit
  Swabble:
    path: ../../Swabble

schemes:
  LittleBaby:
    shared: true
    build:
      targets:
        LittleBaby: all
    test:
      targets:
        - LittleBabyTests
        - LittleBabyLogicTests
  LittleBabyLogicTests:
    shared: true
    build:
      targets:
        LittleBabyLogicTests: all
    test:
      targets:
        - LittleBabyLogicTests

targets:
  LittleBaby:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: LittleBabyShareExtension
        embed: true
      - target: LittleBabyActivityWidget
        embed: true
      - target: LittleBabyWatchApp
      - package: LittleBabyKit
      - package: LittleBabyKit
        product: LittleBabyChatUI
      - package: LittleBabyKit
        product: LittleBabyProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/LittleBaby.entitlements
        CODE_SIGN_STYLE: "$(LITTLEBABY_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(LITTLEBABY_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(LITTLEBABY_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(LITTLEBABY_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          LITTLEBABY_PUSH_TRANSPORT: direct
          LITTLEBABY_PUSH_DISTRIBUTION: local
          LITTLEBABY_PUSH_RELAY_BASE_URL: ""
          LITTLEBABY_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          LITTLEBABY_PUSH_TRANSPORT: direct
          LITTLEBABY_PUSH_DISTRIBUTION: local
          LITTLEBABY_PUSH_RELAY_BASE_URL: ""
          LITTLEBABY_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: LittleBaby
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.littlebaby.ios
            CFBundleURLSchemes:
              - littlebaby
        CFBundleShortVersionString: "$(LITTLEBABY_MARKETING_VERSION)"
        LittleBabyCanonicalVersion: "$(LITTLEBABY_IOS_VERSION)"
        CFBundleVersion: "$(LITTLEBABY_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.littlebaby.ios.bgrefresh
        NSLocalNetworkUsageDescription: LittleBaby discovers and connects to your LittleBaby gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _littlebaby-gw._tcp
        NSCameraUsageDescription: LittleBaby can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: LittleBaby uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: LittleBaby can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: LittleBaby needs microphone access for voice wake.
        NSMotionUsageDescription: LittleBaby may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: LittleBaby needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: LittleBaby uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        LittleBabyPushTransport: "$(LITTLEBABY_PUSH_TRANSPORT)"
        LittleBabyPushDistribution: "$(LITTLEBABY_PUSH_DISTRIBUTION)"
        LittleBabyPushRelayBaseURL: "$(LITTLEBABY_PUSH_RELAY_BASE_URL)"
        LittleBabyPushAPNsEnvironment: "$(LITTLEBABY_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  LittleBabyShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: LittleBabyKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(LITTLEBABY_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(LITTLEBABY_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(LITTLEBABY_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(LITTLEBABY_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: LittleBaby Share
        CFBundleShortVersionString: "$(LITTLEBABY_MARKETING_VERSION)"
        CFBundleVersion: "$(LITTLEBABY_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  LittleBabyActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/LittleBabyActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(LITTLEBABY_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(LITTLEBABY_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(LITTLEBABY_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: LittleBaby Activity
        CFBundleShortVersionString: "$(LITTLEBABY_MARKETING_VERSION)"
        CFBundleVersion: "$(LITTLEBABY_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  LittleBabyWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: LittleBabyWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(LITTLEBABY_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(LITTLEBABY_CODE_SIGN_STYLE)"
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(LITTLEBABY_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(LITTLEBABY_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(LITTLEBABY_WATCH_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(LITTLEBABY_WATCH_APP_PROFILE)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: LittleBaby
        CFBundleShortVersionString: "$(LITTLEBABY_MARKETING_VERSION)"
        CFBundleVersion: "$(LITTLEBABY_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(LITTLEBABY_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  LittleBabyWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(LITTLEBABY_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(LITTLEBABY_CODE_SIGN_STYLE)"
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(LITTLEBABY_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(LITTLEBABY_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(LITTLEBABY_WATCH_EXTENSION_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(LITTLEBABY_WATCH_EXTENSION_PROFILE)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: LittleBaby
        CFBundleShortVersionString: "$(LITTLEBABY_MARKETING_VERSION)"
        CFBundleVersion: "$(LITTLEBABY_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(LITTLEBABY_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  LittleBabyTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: LittleBaby
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(LITTLEBABY_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(LITTLEBABY_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.littlebaby.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LittleBaby.app/LittleBaby"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: LittleBabyTests
        CFBundleShortVersionString: "$(LITTLEBABY_MARKETING_VERSION)"
        CFBundleVersion: "$(LITTLEBABY_BUILD_VERSION)"

  LittleBabyLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: LittleBabyKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(LITTLEBABY_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(LITTLEBABY_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.littlebaby.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: LittleBabyLogicTests
        CFBundleShortVersionString: "$(LITTLEBABY_MARKETING_VERSION)"
        CFBundleVersion: "$(LITTLEBABY_BUILD_VERSION)"
