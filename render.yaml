services:
  - type: web
    name: openclaw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: LITTLEBABY_GATEWAY_PORT
        value: "8080"
      - key: LITTLEBABY_STATE_DIR
        value: /data/.littlebaby
      - key: LITTLEBABY_WORKSPACE_DIR
        value: /data/workspace
      - key: LITTLEBABY_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 1
